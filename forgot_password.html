<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | FarmPortal</title>
    <link rel="icon" href="emc.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-T3c6CoIi6uLrA9TneNEoa7RxnatzjcDSCmG1MXxSR1GAsXEV/Dwwykc2MPK8M2HN" crossorigin="anonymous">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body {
            background-image: url('img/a2.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            background-attachment: fixed;
        }

        body::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            z-index: -1;
        }

        .login-card {
            max-width: 450px;
            margin: 80px auto;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.2);
        }

        .form-floating input:focus {
            box-shadow: none;
            border-color: var(--primary-color);
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-lg">
        <div class="container">
            <a class="navbar-brand text-white" href="index.html">
                <i class="fas fa-leaf me-2"></i>FarmPortal
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="index.html">Home</a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link text-white-50" href="login.html">Login</a>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="text-center text-white mt-5">
            <h1 class="display-4 fw-bold">Password Recovery 🔐</h1>
            <p class="lead">Enter your details to reset your password.</p>
        </div>

        <div class="login-card">
            <h2 class="text-center mb-4" style="color: var(--primary-color);">Reset Password</h2>

            <form id="resetForm">
                <div class="form-floating mb-4">
                    <input type="text" class="form-control" id="userId" placeholder="User ID / Email" required>
                    <label for="userId">Enter User ID</label>
                </div>

                <div class="d-grid gap-2">
                    <button type="submit" class="btn btn-success btn-lg">Reset Password <i
                            class="fas fa-paper-plane ms-2"></i></button>
                </div>
            </form>

            <div class="mt-4 text-center">
                <small>Remembered your password? <a href="login.html" class="custom-link">Login Here</a></small>
            </div>
        </div>

        <div class="text-center text-white pb-4">
            <a href="index.html" class="text-white text-decoration-none">Back to Home</a>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>

    <script>
        document.getElementById('resetForm').addEventListener('submit', function (e) {
            e.preventDefault();
            const userId = document.getElementById('userId').value;

            // Simulation of reset process
            if (userId.trim() !== "") {
                alert(`Password reset link has been sent to the registered email for User ID: ${userId}`);
                // In a real app, you would make an API call here.
                window.location.href = 'login.html';
            } else {
                alert("Please enter a valid User ID.");
            }
        });
    </script>
</body>

</html>
