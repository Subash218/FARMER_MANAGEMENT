<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | FarmStore</title>
    <link rel="icon" href="img/a4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="shop.css">
</head>

<body>

    <div class="container py-5">
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div class="card shadow border-0 p-4">
                    <h2 class="mb-4 text-center fw-bold text-success">Checkout</h2>

                    <form id="checkoutForm">
                        <h5 class="mb-3">Shipping Details</h5>
                        <div class="row g-3">
                            <div class="col-md-6">
                                <label class="form-label">First Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Last Name</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-12">
                                <label class="form-label">Address</label>
                                <textarea class="form-control" rows="2" required></textarea>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">City</label>
                                <input type="text" class="form-control" required>
                            </div>
                            <div class="col-md-6">
                                <label class="form-label">Zip Code</label>
                                <input type="text" class="form-control" required>
                            </div>
                        </div>

                        <hr class="my-4">

                        <h5 class="mb-3">Payment Method</h5>
                        <div class="form-check mb-2">
                            <input class="form-check-input" type="radio" name="payment" id="cod" checked>
                            <label class="form-check-label" for="cod">
                                Cash on Delivery (COD)
                            </label>
                        </div>
                        <div class="form-check mb-4">
                            <input class="form-check-input" type="radio" name="payment" id="upi">
                            <label class="form-check-label" for="upi">
                                UPI / Online Payment (Coming Soon)
                            </label>
                        </div>

                        <div class="d-grid">
                            <button type="submit" class="btn btn-shop-primary btn-lg">Place Order</button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.getElementById('checkoutForm').addEventListener('submit', async (e) => {
            e.preventDefault();

            const user = JSON.parse(localStorage.getItem('user'));
            const cart = JSON.parse(localStorage.getItem('farmCart')) || [];

            if (!user) {
                alert('Please login to place an order.');
                window.location.href = 'login.html';
                return;
            }

            if (cart.length === 0) {
                alert('Your cart is empty.');
                window.location.href = 'ecommerce.html';
                return;
            }

            const btn = e.target.querySelector('button[type="submit"]');
            btn.innerHTML = '<span class="spinner-border spinner-border-sm me-2"></span>Processing...';
            btn.disabled = true;

            // Prepare order data
            // Grouping items into a string for the simple text column
            const itemNames = cart.map(item => item.name).join(', ');
            const total = cart.reduce((sum, item) => sum + parseFloat(item.price), 0);

            const orderData = {
                username: user.username,
                items: itemNames,
                total: total
            };

            try {
                const response = await fetch('http://localhost:5000/api/orders', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(orderData)
                });

                if (response.ok) {
                    alert('Order Placed Successfully! Your items will be delivered soon.');
                    localStorage.removeItem('farmCart'); // Clear cart
                    window.location.href = 'profile.html'; // Redirect to profile to see the order
                } else {
                    const error = await response.json();
                    alert('Failed to place order: ' + error.error);
                    btn.innerHTML = 'Place Order';
                    btn.disabled = false;
                }
            } catch (error) {
                console.error('Error:', error);
                alert('Failed to connect to the server.');
                btn.innerHTML = 'Place Order';
                btn.disabled = false;
            }
        });
    </script>
</body>

</html>
