<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | FarmStore</title>
    <link rel="icon" href="img/a4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="shop.css">
</head>

<body>

    <!-- Navbar -->
    <nav class="navbar navbar-expand-lg shop-header sticky-top">
        <div class="container">
            <a class="navbar-brand text-success fw-bold" href="ecommerce.html">
                <i class="fas fa-shopping-basket me-2"></i>FarmStore
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#shopNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="shopNav">
                <ul class="navbar-nav me-auto mb-2 mb-lg-0">
                    <li class="nav-item"><a class="nav-link" href="index.html">Home</a></li>
                    <li class="nav-item"><a class="nav-link" href="ecommerce.html#seeds">Seeds</a></li>
                    <li class="nav-item"><a class="nav-link" href="ecommerce.html#tools">Tools</a></li>
                </ul>
                <div class="d-flex align-items-center">
                    <a href="cart.html" class="position-relative text-dark me-3">
                        <i class="fas fa-shopping-cart fa-lg"></i>
                        <span class="cart-badge" id="cartCount">0</span>
                    </a>
                </div>
            </div>
        </div>
    </nav>

    <div class="container py-5">
        <nav aria-label="breadcrumb">
            <ol class="breadcrumb">
                <li class="breadcrumb-item"><a href="ecommerce.html">Home</a></li>
                <li class="breadcrumb-item active" aria-current="page">Product Details</li>
            </ol>
        </nav>

        <div class="row g-5">
            <!-- Product Image -->
            <div class="col-md-6">
                <div
                    class="product-gallery-img bg-light p-3 text-center h-100 d-flex align-items-center justify-content-center rounded shadow-sm">
                    <img src="" alt="Product Image" id="prodImg" class="img-fluid rounded"
                        style="max-height: 400px; object-fit: contain; display: none;">
                    <div id="imgPlaceholder" class="text-success">
                        <i class="fas fa-box-open fa-10x"></i>
                    </div>
                </div>
            </div>

            <!-- Product Info -->
            <div class="col-md-6">
                <h1 class="display-5 fw-bold mb-3" id="prodTitle">Loading Product...</h1>
                <div class="mb-3">
                    <span class="h2 text-success fw-bold me-3" id="prodPrice">--</span>
                    <span class="badge bg-success">In Stock</span>
                </div>
                <p class="lead mb-4" id="prodDesc">Fetching details...</p>

                <div class="d-flex gap-3 mb-4">
                    <input type="number" class="form-control w-25" value="1" min="1" id="prodQty">
                    <button class="btn btn-shop-primary btn-lg flex-grow-1" id="addToCartBtn" disabled>
                        <i class="fas fa-shopping-cart me-2"></i>Add to Cart
                    </button>
                </div>

                <div class="accordion" id="prodDetails">
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseOne">
                                Product Feature
                            </button>
                        </h2>
                        <div id="collapseOne" class="accordion-collapse collapse show" data-bs-parent="#prodDetails">
                            <div class="accordion-body" id="prodFeaturesList">
                                <ul>
                                    <li>High quality material</li>
                                    <li>Certified for organic farming</li>
                                    <li>Long shelf life</li>
                                    <li>Trusted by thousands of farmers</li>
                                </ul>
                            </div>
                        </div>
                    </div>
                    <div class="accordion-item">
                        <h2 class="accordion-header">
                            <button class="accordion-button collapsed" type="button" data-bs-toggle="collapse"
                                data-bs-target="#collapseTwo">
                                Specifications
                            </button>
                        </h2>
                        <div id="collapseTwo" class="accordion-collapse collapse" data-bs-parent="#prodDetails">
                            <div class="accordion-body" id="prodSpecs">
                                Loading specifications...
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            updateCartBadge();
            const urlParams = new URLSearchParams(window.location.search);
            const id = urlParams.get('id');

            if (id) {
                fetchProductDetails(id);
            } else {
                showError("No product ID specified.");
            }
        });

        async function fetchProductDetails(id) {
            try {
                const response = await fetch(`/api/products/${id}`);
                if (!response.ok) throw new Error('Product not found');
                const product = await response.json();
                renderProduct(product);
            } catch (error) {
                console.error('Error:', error);
                showError("Product not found or server error.");
            }
        }

        function renderProduct(p) {
            document.getElementById('prodTitle').innerText = p.name;
            document.getElementById('prodPrice').innerText = `₹${p.price}`;
            document.getElementById('prodDesc').innerText = p.description;

            // Update Image
            const prodImg = document.getElementById('prodImg');
            const imgPlaceholder = document.getElementById('imgPlaceholder');

            if (p.image) {
                prodImg.src = p.image;
                prodImg.style.display = 'block';
                imgPlaceholder.style.display = 'none';
            } else {
                prodImg.style.display = 'none';
                imgPlaceholder.style.display = 'block';
            }

            // Update Features
            if (p.features) {
                const featuresList = p.features.split(',').map(f => `<li>${f.trim()}</li>`).join('');
                document.getElementById('prodFeaturesList').innerHTML = `<ul>${featuresList}</ul>`;
            }

            // Update Specs
            if (p.specs) {
                const specsHtml = p.specs.split('|').map(s => {
                    const [key, val] = s.split(':').map(str => str.trim());
                    if (val) {
                        return `<div class="d-flex justify-content-between border-bottom py-2">
                                    <span class="fw-bold">${key}</span>
                                    <span>${val}</span>
                                </div>`;
                    }
                    return `<div class="py-2">${key}</div>`;
                }).join('');
                document.getElementById('prodSpecs').innerHTML = specsHtml;
            } else {
                document.getElementById('prodSpecs').innerText = "Internal specifications not available.";
            }

            // Enable add to cart
            const btn = document.getElementById('addToCartBtn');
            btn.disabled = false;

            // clear old listeners to be safe (though simple replace is fine here)
            const newBtn = btn.cloneNode(true);
            btn.parentNode.replaceChild(newBtn, btn);

            newBtn.addEventListener('click', () => {
                const qty = parseInt(document.getElementById('prodQty').value);
                addToCart({ id: p.id, name: p.name, price: p.price }, qty);
                alert(`${qty} x ${p.name} added to cart!`);
            });
        }

        function showError(msg) {
            document.getElementById('prodTitle').innerText = "Error";
            document.getElementById('prodDesc').innerText = msg;
            document.getElementById('addToCartBtn').disabled = true;
        }

        function addToCart(product, qty) {
            let cart = JSON.parse(localStorage.getItem('farmCart')) || [];
            for (let i = 0; i < qty; i++) {
                cart.push(product);
            }
            localStorage.setItem('farmCart', JSON.stringify(cart));
            updateCartBadge();
        }

        function updateCartBadge() {
            let cart = JSON.parse(localStorage.getItem('farmCart')) || [];
            document.getElementById('cartCount').innerText = cart.length;
        }
    </script>
</body>

</html>
