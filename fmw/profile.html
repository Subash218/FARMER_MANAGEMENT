<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Customer Profile | FarmPortal</title>
    <link rel="icon" href="img/a4.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .profile-container {
            max-width: 800px;
            margin: 50px auto;
        }

        .profile-card {
            background: white;
            border-radius: 20px;
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
        }

        .profile-header {
            background: linear-gradient(135deg, var(--primary-color), var(--secondary-color));
            color: white;
            padding: 40px;
            text-align: center;
        }

        .profile-avatar {
            width: 120px;
            height: 120px;
            background: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 15px;
            color: var(--primary-color);
            border: 5px solid rgba(255, 255, 255, 0.3);
        }

        .info-list {
            padding: 30px;
        }

        .info-item {
            display: flex;
            padding: 15px 0;
            border-bottom: 1px solid #eee;
        }

        .info-label {
            width: 150px;
            font-weight: bold;
            color: #666;
        }

        .info-value {
            flex: 1;
            color: #333;
        }

        .info-item:last-child {
            border-bottom: none;
        }
    </style>
</head>

<body class="bg-light">

    <nav class="navbar navbar-expand-lg sticky-top bg-white shadow-sm">
        <div class="container">
            <a class="navbar-brand" href="index.html">
                <i class="fas fa-leaf me-2"></i>FarmPortal
            </a>
            <div class="ms-auto">
                <a href="farmer.html" class="btn btn-outline-success rounded-pill px-4">Dashboard</a>
            </div>
        </div>
    </nav>

    <div class="container profile-container">
        <!-- Profile Info Card -->
        <div class="profile-card mb-5">
            <div class="profile-header">
                <div class="profile-avatar">
                    <i class="fas fa-user fa-4x"></i>
                </div>
                <h2 id="fullName">Customer Name</h2>
                <p id="userName" class="mb-0 text-white-50">@username</p>
            </div>
            <div class="info-list">
                <div class="info-item">
                    <div class="info-label">Email</div>
                    <div class="info-value" id="email">email@example.com</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Age</div>
                    <div class="info-value" id="age">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Gender</div>
                    <div class="info-value" id="gender">--</div>
                </div>
                <div class="info-item">
                    <div class="info-label">Occupation</div>
                    <div class="info-value" id="workType">--</div>
                </div>

                <div class="text-center mt-4">
                    <button id="logoutBtn" class="btn btn-danger rounded-pill px-5">Logout <i
                            class="fas fa-sign-out-alt ms-2"></i></button>
                </div>
            </div>
        </div>

        <!-- Order History Section -->
        <div class="order-history pb-5">
            <h3 class="fw-bold mb-4"><i class="fas fa-history text-success me-2"></i>My Orders</h3>
            <div id="ordersContainer">
                <div class="text-center py-5">
                    <div class="spinner-border text-success" role="status">
                        <span class="visually-hidden">Loading...</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const userData = JSON.parse(localStorage.getItem('farmer_user'));

            if (!userData) {
                window.location.href = 'login.html';
                return;
            }

            // Populate profile
            document.getElementById('fullName').textContent = userData.full_name;
            document.getElementById('userName').textContent = `@${userData.username}`;
            document.getElementById('email').textContent = userData.email;
            document.getElementById('age').textContent = userData.age || 'Not specified';
            document.getElementById('gender').textContent = userData.gender || 'Not specified';
            document.getElementById('workType').textContent = userData.work_type || 'Not specified';

            // Fetch Orders
            fetchOrders(userData.username);

            // Logout Logic
            // Logout Logic
            document.getElementById('logoutBtn').addEventListener('click', () => {
                localStorage.removeItem('farmer_user');
                window.location.href = 'login.html';
            });
        });

        async function fetchOrders(username) {
            const container = document.getElementById('ordersContainer');
            try {
                const response = await fetch(`/api/orders/${username}`);
                const orders = await response.json();

                if (orders.length === 0) {
                    container.innerHTML = `
                        <div class="card border-0 shadow-sm p-5 text-center">
                            <i class="fas fa-shopping-basket fa-3x text-muted mb-3"></i>
                            <p class="lead mb-0">You haven't placed any orders yet.</p>
                            <a href="ecommerce.html" class="btn btn-success mt-3 rounded-pill px-4">Start Shopping</a>
                        </div>`;
                    return;
                }

                container.innerHTML = '';
                orders.forEach(order => {
                    const orderDate = new Date(order.date);
                    // Calculate ETA: Order Date + 4 days
                    const etaDate = new Date(orderDate);
                    etaDate.setDate(orderDate.getDate() + 4);

                    const etaStr = etaDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'long', year: 'numeric' });
                    const dateStr = orderDate.toLocaleDateString('en-IN', { day: 'numeric', month: 'short', year: 'numeric' });

                    const orderCard = document.createElement('div');
                    orderCard.className = 'card border-0 shadow-sm mb-3 overflow-hidden';
                    orderCard.innerHTML = `
                        <div class="card-header bg-white py-3 d-flex justify-content-between align-items-center">
                            <div>
                                <span class="text-muted small">ORDER ID:</span>
                                <span class="fw-bold">#FP${order.id.toString().padStart(5, '0')}</span>
                            </div>
                            <span class="badge bg-${order.status === 'Approved' ? 'success' : 'warning'} rounded-pill px-3">${order.status}</span>
                        </div>
                        <div class="card-body p-4">
                            <div class="row items-center">
                                <div class="col-md-7">
                                    <h6 class="text-muted small text-uppercase mb-2">Items</h6>
                                    <p class="mb-0 fw-bold">${order.items}</p>
                                    <p class="text-muted small mt-2">Ordered on ${dateStr}</p>
                                </div>
                                <div class="col-md-3">
                                    <h6 class="text-muted small text-uppercase mb-2">Total Amount</h6>
                                    <h5 class="text-success fw-bold mb-0">₹${order.total}</h5>
                                </div>
                                <div class="col-md-2 text-md-end">
                                    <h6 class="text-muted small text-uppercase mb-1">ETA</h6>
                                    <span class="text-dark fw-bold">${etaStr}</span>
                                </div>
                            </div>
                            <div class="mt-4 pt-3 border-top">
                                <div class="d-flex justify-content-between align-items-center">
                                    <div class="small">
                                        <i class="fas fa-truck text-success me-2"></i>
                                        Estimate Arrival: <strong>${etaStr}</strong>
                                    </div>
                                    <button class="btn btn-sm btn-outline-success rounded-pill px-3">Track Order</button>
                                </div>
                                <div class="progress mt-2" style="height: 6px;">
                                    <div class="progress-bar bg-success" role="progressbar" style="width: ${order.status === 'Approved' ? '100%' : '35%'}" aria-valuenow="35" aria-valuemin="0" aria-valuemax="100"></div>
                                </div>
                            </div>
                        </div>
                    `;
                    container.appendChild(orderCard);
                });
            } catch (error) {
                console.error('Error:', error);
                container.innerHTML = '<div class="alert alert-danger">Failed to load order history.</div>';
            }
        }
    </script>
</body>

</html>
